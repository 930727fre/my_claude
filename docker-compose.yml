services:
  claude:
    container_name: claude
    build:
      context: .
      dockerfile: Dockerfile.claude
      args:
        USER_UID: "${HOST_UID:?HOST_UID not exported — run ./setup.sh for instructions}"
        USER_GID: "${HOST_GID:?HOST_GID not exported — run ./setup.sh for instructions}"
    volumes:
      - claude-data:/home/claude
      - type: bind
        source: ${HOME}/utilities
        target: /home/claude/utilities
        bind:
          create_host_path: false
      - type: bind
        source: ${HOME}/workspace
        target: /home/claude/workspace
        bind:
          create_host_path: false
    stdin_open: true
    tty: true
    networks:
      - my_network

volumes:
  claude-data:

networks:
  my_network:
    external: true
