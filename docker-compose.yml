services:
  claude:
    build:
      context: .
      dockerfile: Dockerfile.claude
      args:
        # HOST_UID / HOST_GID must be exported in the calling shell.
        # Compose fails loudly here if either is unset — see README setup steps.
        USER_UID: "${HOST_UID:?HOST_UID not exported — run ./setup.sh for instructions}"
        USER_GID: "${HOST_GID:?HOST_GID not exported — run ./setup.sh for instructions}"
    volumes:
      # Named volume mounted at $HOME (not at ~/.claude/) so it covers both
      # ~/.claude/ AND the sibling ~/.claude.json file Claude Code writes for
      # account identity / MCP / oauth state. See DESIGN.md Decision 3.
      - claude-data:/home/claude
      # CLAUDE.md uses long-form syntax + create_host_path: false:
      # if source doesn't exist, compose up fails immediately. Without this,
      # docker's default behavior silently creates an empty directory in its
      # place, the container starts but Claude can't read user instructions,
      # and no error is raised.
      - type: bind
        source: ${HOME}/my_claude/CLAUDE.md
        target: /home/claude/.claude/CLAUDE.md
        read_only: true
        bind:
          create_host_path: false
      # Mount whatever repos you need — adjust freely
      - ${HOME}/repoA:/home/claude/repoA
      - ${HOME}/repoB:/home/claude/repoB
    stdin_open: true
    tty: true
    networks:
      - my_network

volumes:
  claude-data:

networks:
  my_network:
    external: true
